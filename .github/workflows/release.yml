name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  check-version:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      version: ${{ steps.check.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Check version
        id: check
        run: |
          VERSION=$(node -p "require('./package.json').version")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Checking if v$VERSION release exists..."

          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
            "https://api.github.com/repos/${{ github.repository }}/releases/tags/v$VERSION")

          if [ "$STATUS" = "404" ]; then
            echo "should_release=true" >> $GITHUB_OUTPUT
            echo "Release v$VERSION does not exist — will create."
          else
            echo "should_release=false" >> $GITHUB_OUTPUT
            echo "Release v$VERSION already exists — skipping."
          fi

  build-macos:
    needs: check-version
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build and package
        run: npm run dist
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload DMG artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-dmg
          path: release/*.dmg
          retention-days: 5

      - name: Upload ZIP artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-zip
          path: release/*.zip
          retention-days: 5

  create-release:
    needs: [check-version, build-macos]
    if: needs.check-version.outputs.should_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download DMG artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-dmg
          path: release/

      - name: Download ZIP artifacts
        uses: actions/download-artifact@v4
        with:
          name: macos-zip
          path: release/

      - name: Generate hashes and latest.json
        run: node scripts/generate-release-hash.js

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${{ needs.check-version.outputs.version }}
          gh release create "v$VERSION" \
            --title "Nova v$VERSION" \
            --notes "Bug fixes and improvements." \
            release/*.dmg \
            release/*.zip \
            release/latest.json \
            release/hashes.txt
